name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  scan:
    name: code scanning upload
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Run opseclint (SARIF)
        run: ./target/release/opseclint examples/recon.sh --sarif > opseclint.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: opseclint.sarif
          category: opseclint

  sigma-enrich:
    name: sigma live enrichment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Clone the SigmaHQ ruleset
        run: git clone --depth 1 https://github.com/SigmaHQ/sigma.git sigma-rules

      - name: Build release binary
        run: cargo build --release

      - name: Enrich examples with real SigmaHQ rules
        run: |
          set -o pipefail
          out=$(./target/release/opseclint examples/recon.sh --sigma sigma-rules/rules --no-color 2>&1)
          echo "$out"
          n=$(printf '%s\n' "$out" | grep -oE 'enriched [0-9]+ finding' | grep -oE '[0-9]+' | head -1)
          n=${n:-0}
          echo "findings enriched with real Sigma rules: $n"
          if [ "$n" -lt 1 ]; then
            echo "::error::no findings were enriched from the live SigmaHQ ruleset"
            exit 1
          fi
